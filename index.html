<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Appu</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:#000;
color:white;
}

.hero{
width:100%;
height:100vh;
display:flex;
justify-content:space-around;
align-items:center;
padding:40px;
background:
linear-gradient(rgba(0,0,0,.75),
rgba(0,0,0,.75)),
url('appu.png');
background-size:cover;
background-position:center;
}

.left{
width:50%;
}

.left h1{
font-size:80px;
color:gold;
text-shadow:0 0 20px gold;
animation:glow 2s infinite alternate;
}

.left h2{
font-size:70px;
margin-top:10px;
}

.date{
font-size:28px;
color:gold;
margin-top:20px;
}

.wish{
font-size:24px;
margin-top:25px;
line-height:1.8;
}

.right{
text-align:center;
}

.right img{
width:420px;
height:520px;
object-fit:cover;
border-radius:25px;
border:5px solid gold;
box-shadow:0 0 30px gold;
animation:float 4s ease-in-out infinite;
}

.music-btn{
margin-top:20px;
padding:15px 35px;
font-size:20px;
font-weight:bold;
background:gold;
color:black;
border:none;
border-radius:30px;
cursor:pointer;
box-shadow:0 0 20px gold;
}

.music-btn:hover{
transform:scale(1.05);
}

.cake{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
font-size:90px;
}

.fire{
position:absolute;
bottom:115px;
left:50%;
transform:translateX(-50%);
font-size:35px;
animation:flicker .2s infinite;
}

.balloon{
position:absolute;
bottom:-100px;
font-size:35px;
animation:fly linear infinite;
}

@keyframes glow{
from{
text-shadow:0 0 15px gold;
}
to{
text-shadow:0 0 45px orange;
}
}

@keyframes float{
0%,100%{
transform:translateY(0);
}
50%{
transform:translateY(-15px);
}
}

@keyframes flicker{
0%{
transform:translateX(-50%) scale(1);
}
50%{
transform:translateX(-50%) scale(1.3);
}
100%{
transform:translateX(-50%) scale(1);
}
}

@keyframes fly{
0%{
transform:translateY(0);
}
100%{
transform:translateY(-120vh);
}
}
</style>
</head>

<body>

<section class="hero">

<div class="left">

<h1>🎉 HAPPY BIRTHDAY 🎉</h1>

<h2>Appu 👑</h2>

<p class="date">🎂 July 7, 2004</p>

<p class="wish">
May your life be filled with happiness,
success, laughter and unforgettable memories.
<br><br>
Stay Positive ⭐<br>
Stay Focused 👑<br>
Stay Happy ❤️
</p>

</div>

<div class="right">

<img src="appu.png" alt="Appu">

<br><br>

<button class="music-btn" onclick="playMusic()">
🎵 Play Birthday Song
</button>

<audio id="music" loop>
<source src="birthday.mp3" type="audio/mpeg">
</audio>

</div>

</section>

<div class="cake">🎂</div>
<div class="fire">🔥</div>

<script>

function playMusic(){
document.getElementById("music").play();
}

for(let i=0;i<50;i++){

let balloon=document.createElement("div");

balloon.className="balloon";

let icons=["🎈","🎉","✨","❤️"];

balloon.innerHTML=
icons[Math.floor(Math.random()*icons.length)];

balloon.style.left=Math.random()*100+"vw";

balloon.style.animationDuration=
(5+Math.random()*6)+"s";

document.body.appendChild(balloon);
}

</script>

</body>
</html>
